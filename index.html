<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>


<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <img class="logo" src="assets/Library.svg" alt="Library Logo">
                <ul class="nav__links">
                    <li><a href="#" class="nav__link">Home</a></li>
                    <li><a href="#contact" class="nav__link">Contact</a></li>
                    <li><a href="#books" class="nav__link nav__link--primary ">Books</a></li>
                </ul>
            </div>
        </nav>

        <header>
            <div class="header__container">
                <div class="header__description">
                    <h1>USA's most awarded online library platform</h1>
                    <h2>Find your dream book with <span class="purple-text">Library<span></h2>
                        <a href="#books" class="browse-books">Browse books</a>
                </div>
            
                <figure>
                    <img src="assets/Undraw_Books.svg" alt="Library Landing Image">
                </figure>
            
            
            </div>
        </header>
    </section>
    
    <section id="books">
        <h2>Books</h2>
        <div class="books__container">
            <div class="book">
                <img src="assets/book1.jpg" alt="Book 1">
                <h3>Book Title 1</h3>
                <p>Author: Author Name 1</p>
            </div>
            <div class="book">
                <img src="assets/book2.jpg" alt="Book 2">
                <h3>Book Title 2</h3>
                <p>Author: Author Name 2</p>
            </div>
            <div class="book">
                <img src="assets/book3.jpg" alt="Book 3">
                <h3>Book Title 3</h3>
                <p>Author: Author Name 3</p>
            </div>
        </div>
    </section>

</body>


</html>
